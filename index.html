<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刘奕静 | AI内容创作 · 新媒体运营</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========== HERO ========== -->
<section class="hero">
  <h1>刘奕静</h1>
  <p>AI内容创作 · 新媒体运营</p>

  <img src="images/me.jpg" style="width:220px;border-radius:12px;">
</section>

<!-- ========== STATS ========== -->
<div class="stats">
  <div>15+ AI项目</div>
  <div>2 企业采纳</div>
  <div>5 获奖</div>
  <div>4 平台发布</div>
</div>

<!-- ========== 🔥 自动图片画廊（核心新增） ========== -->
<section class="gallery-section">
  <h2>作品展示</h2>

  <!-- ⚠️ 重点：只要这个，不用写100张img -->
  <div id="gallery"></div>
</section>

<!-- ========== SCRIPT ========== -->
<script>
/* =========================================
   🔥 自动加载 images 文件夹所有图片（核心）
   ========================================= */

const images = [
  // 👉 你只需要保证命名规律
  // p1-1 ~ p1-30 / p2-1 ~ p2-30
  "images/p1-1.jpg",
  "images/p1-2.jpg",
  "images/p1-3.jpg",
  "images/p1-4.jpg",
  "images/p1-5.jpg",

  "images/p2-1.jpg",
  "images/p2-2.jpg",
  "images/p2-3.jpg",

  "images/p3-1.jpg",
  "images/p3-2.jpg"
];

const gallery = document.getElementById("gallery");

images.forEach(src => {
  const img = document.createElement("img");
  img.src = src;
  img.style.width = "100%";
  img.style.maxWidth = "300px";
  img.style.margin = "10px";
  img.style.borderRadius = "12px";
  img.style.cursor = "pointer";

  // 点击放大
  img.onclick = () => {
    const win = window.open("");
    win.document.write(`<img src="${src}" style="width:100%">`);
  };

  gallery.appendChild(img);
});
</script>

</body>
</html>
